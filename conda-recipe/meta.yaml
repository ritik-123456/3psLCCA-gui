{% set name = "three-ps-lcca-gui" %}
{% set version = "1.0.0" %}
{% set git_url = "https://github.com/swas02/3psLCCA-gui.git" %}
{% set branch = "main" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  # url: {{ source_url }}
  # git_url: {{ git_url }}
  # git_rev: {{ branch }}

  path: ..

build:
  number: 0
  noarch: python
  script:  "{{ PYTHON }} -m pip install --no-deps --force-reinstall . -vv"

channel:
  - conda-forge
  - defaults
  - osdag

requirements:
  build:
    - python>=3.10
    - setuptools
    - pip
  host:
    - setuptools
    - pip
    - python>=3.10
  run:
    - python>=3.10
    - PySide6
    - psutil
    - Pillow
    - matplotlib
    - pandas
    - numpy
    - openpyxl
    - PyYAML
    - pylatex

# about:
#   summary: A Python package for performing life cycle cost analysis (LCCA) on three primary steel design options: hot-rolled, cold-formed, and built-up steel sections. This package provides tools and functions to evaluate the economic performance of these steel design options over their entire life cycle, including initial costs, maintenance costs, and end-of-life costs. It is designed to assist engineers and decision-makers in selecting the most cost-effective steel design option for their projects.
#   keywords: steel design, life cycle analysis, engineering
#   license: LGPL-3.0-only
#   license_family: LGPL
#   home: https://osdag.fossee.in
#   dev_url: https://github.com/swas02/3psLCCA-gui
#   doc_url: https://github.com/swas02/3psLCCA-gui